# ==========================================
# Logi_Assist Application Configuration
# ==========================================

server.port=${PORT:8080}
spring.application.name=Logi_Assist

# ---------- H2 Database (file based, zero setup) ----------
spring.datasource.url=jdbc:h2:file:./data/logiassist;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------- File Upload ----------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---------- JWT ----------
# IMPORTANT: change this secret before deploying to production
jwt.secret=LogiAssistSuperSecretKeyForJWTTokenGeneration2026ChangeThisInProduction
jwt.expiration.ms=86400000

# ---------- Gemini AI ----------
# Get your free API key from https://aistudio.google.com/apikey
# Set the GEMINI_API_KEY environment variable in your deployment platform
gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY_HERE}
gemini.api.model=gemini-3.5-flash
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/${gemini.api.model}:generateContent

# ---------- Logging ----------
logging.level.org.springframework.security=INFO
logging.level.com.logiassist=DEBUG
